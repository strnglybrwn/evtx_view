<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AAI Demo</title>
    <style>
      :root{
        --bg:#0b1020;--panel:#0f1724;--muted:#9aa4b2;--accent:#7c5cff;--success:#26d07b;--warn:#ffb020;--danger:#ff6b6b;--card:#0f1726
      }
      html,body{height:100%;background:var(--bg);color:#e6eef8;margin:0;font-family:Inter,ui-sans-serif,system-ui,Arial}
      .container{padding:24px;max-width:1100px;margin:0 auto}
      h1{margin:0 0 12px 0;color:var(--accent);letter-spacing:2px}
      textarea{width:100%;height:6rem;background:#071025;border:1px solid #122032;color:#e6eef8;padding:8px;border-radius:6px}
  textarea.paste-area.dragover{outline:2px dashed var(--accent);box-shadow:0 2px 8px rgba(124,92,255,0.08)}
      input,button,textarea{font-family:inherit}
      button{background:var(--accent);color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin-right:8px}
      .card{background:var(--panel);border:1px solid rgba(255,255,255,0.03);padding:12px;border-radius:8px}
      #result{background:linear-gradient(180deg,#0b1526, #07101a);border:1px solid rgba(255,255,255,0.03);padding:16px;border-radius:8px;min-height:140px}
      #needsPrompt .box{border:1px dashed rgba(255,255,255,0.06);padding:10px;border-radius:6px;background:#07131f}
      #selectionPanel{padding:8px;background:transparent;white-space:pre-wrap}
      .score-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
      .score-name{min-width:120px;color:var(--muted);font-size:13px}
      .score-bar-wrap{flex:1;background:rgba(255,255,255,0.03);height:12px;border-radius:6px;overflow:hidden}
      .score-bar{height:100%;background:var(--accent);width:0%;transition:width .25s}
      .badge{padding:4px 8px;border-radius:999px;font-size:12px;color:#07101a;background:var(--muted);margin-left:8px}
  /* simple transitions between suitability and results */
  .fade-enter{opacity:0;transform:translateY(6px);transition:opacity .28s ease,transform .28s ease}
  .fade-enter.fade-enter-active{opacity:1;transform:none}
  .fade-exit{opacity:1;transform:none;transition:opacity .22s ease,transform .22s ease}
  .fade-exit.fade-exit-active{opacity:0;transform:translateY(-6px)}
  #result.loading{opacity:0.85;filter:blur(0.4px);}
    </style>
  </head>
  <body>
    <h1>J A A R V I S</h1>

    <section id="topRow" style="margin-top:1rem">
      <div id="col-question" class="col-left">
        <h2>Question</h2>
        <form id="form">
          <label for="input" style="display:block;margin-bottom:.25rem">Question</label>
          <textarea id="input" class="paste-area" placeholder="Type your query, paste an image...">Who was ada lovelace</textarea>
          <div style="margin-top:.25rem;color:var(--muted);font-size:13px">Tip: you can paste or drop an image into the question box to attach it.</div>
          <div style="margin-top:.5rem">
            <button type="submit">Go!</button>
          </div>
            <div id="pastePreview" aria-live="polite" style="margin-top:.5rem;display:flex;gap:8px;flex-wrap:wrap"></div>
            <div id="attachControls" style="margin-top:.5rem;display:flex;gap:8px;align-items:center">
              <button id="removeAllBtn" type="button" style="display:none;background:#2b2f42;color:#fff;padding:6px 8px;border-radius:6px;border:none;">Remove all</button>
              <span id="attachIndicator" style="display:none;color:var(--accent);font-size:13px">Attachments will be sent</span>
            </div>
        </form>
      </div>

      <div id="col-result" class="col-center">
        <h2>Combined result</h2>
        <div id="result" style="padding:1rem;white-space:pre-wrap">(no result yet)</div>
      </div>

      <aside id="col-scores" class="col-right">
        <h2>Agent suitability</h2>
        <div id="selectionPanel" class="card" style="margin-top:6px;padding:8px"></div>
      </aside>
    </section>
    <style>
      /* grid layout for top row: 39% / 39% / 20% */
      #topRow{display:grid;grid-template-columns:39% 39% 20%;gap:1rem;align-items:start}
      .col-left,.col-center{min-width:200px}
      .col-right{min-width:160px}
      @media (max-width:900px){
        #topRow{grid-template-columns:1fr;}
        .col-right{order:3}
      }
    </style>

  <!-- Agents sidebar removed; agent outputs now appear in the Combined result -->

  <div class="container">
    <div id="needsPrompt" style="margin-top:1rem"></div>
  </div>

    <script src="/main.js"></script>
  </body>
</html>
